services:
  - type: web
    name: elimu-global-backend
    env: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PORT
        value: 3000
    plan: starter # This plan has 512MB RAM
    scaling:
      minInstances: 1
      maxInstances: 1
    healthCheckPath: /api/health
    autoDeploy: false